name: Keep Warm

on:
  workflow_dispatch:  # manual only — use UptimeRobot instead (GitHub Actions free tier: 2000min/month)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping endpoints
        run: |
          BASE="https://reihen.vercel.app"
          urls=(
            "$BASE/api/health"
            "$BASE/api/centers"
            "$BASE/api/auth/me"
          )
          for url in "${urls[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            echo "$url → $status"
          done
