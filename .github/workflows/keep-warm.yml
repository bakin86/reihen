name: Keep Warm

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes
  workflow_dispatch:         # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping endpoints
        run: |
          BASE="https://reihen.vercel.app"
          urls=(
            "$BASE/api/health"
            "$BASE/api/centers"
            "$BASE/api/auth/me"
          )
          for url in "${urls[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            echo "$url → $status"
          done
